<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FraudGuard — Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh">

<div class="card" style="width:100%;max-width:400px">
  <div style="text-align:center;margin-bottom:2rem">
    <div style="font-size:2.5rem">🛡</div>
    <h1 style="font-size:1.4rem;font-weight:700;color:var(--primary)">Create Account</h1>
  </div>

  <div id="error-box" style="display:none;background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:.75rem 1rem;color:#dc2626;font-size:.88rem;margin-bottom:1rem"></div>

  <div class="form-group"><label>Full Name</label><input type="text" id="name" placeholder="Jane Smith"></div>
  <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="you@example.com"></div>
  <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Min 6 characters"></div>

  <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:.5rem" id="reg-btn" onclick="register()">Create Account</button>
  <p style="text-align:center;margin-top:1.2rem;font-size:.88rem;color:var(--muted)">
    Already registered? <a href="login.html" style="color:var(--primary)">Sign in</a>
  </p>
</div>

<script>
const API = "http://localhost:3000";

async function register() {
  const btn  = document.getElementById("reg-btn");
  const name = document.getElementById("name").value.trim();
  const email= document.getElementById("email").value.trim();
  const pass = document.getElementById("password").value;

  if (!name || !email || !pass) return showError("Please fill in all fields");
  if (pass.length < 6) return showError("Password must be at least 6 characters");

  btn.disabled = true; btn.innerHTML = `<span class="spinner"></span> Creating...`;

  try {
    const res  = await fetch(`${API}/auth/register`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, password: pass })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    localStorage.setItem("fg_token", data.token);
    localStorage.setItem("fg_user",  JSON.stringify(data.user));
    window.location.href = "index.html";
  } catch (err) {
    showError(err.message);
  } finally {
    btn.disabled = false; btn.innerHTML = "Create Account";
  }
}

function showError(msg) {
  const b = document.getElementById("error-box");
  b.textContent = msg; b.style.display = "block";
}
</script>
<script>
function toggleDark() {
  document.body.classList.toggle("dark");
  const btn = document.querySelector(".dark-toggle");
  const dark = document.body.classList.contains("dark");
  localStorage.setItem("fg_dark", dark);
  btn.textContent = dark ? "☀️ Light" : "🌙 Dark";
}
// Restore preference on load
if (localStorage.getItem("fg_dark") === "true") {
  document.body.classList.add("dark");
  document.querySelector(".dark-toggle").textContent = "☀️ Light";
}
</script>
</body>
</html>
